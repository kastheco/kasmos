[package]
name = "kasmos"
version = "0.1.0"
edition.workspace = true

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
thiserror = "1.0"
anyhow = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
toml = "0.8"
tokio = { version = "1.0", features = ["fs", "io-util", "macros", "net", "rt", "sync", "time"] }
nix = { version = "0.27", features = ["fs"] }
libc = "0.2"

[dev-dependencies]
tempfile = "3.0"
